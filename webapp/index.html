<!DOCTYPE html>
<html lang="en" xml:lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Management Service</title>
    <link rel="shortcut icon" href="https://www.sap.com/dam/application/shared/logos/sap-logo-svg.svg">
    <link rel="apple-touch-icon" href="https://www.sap.com/dam/application/shared/logos/sap-logo-svg.svg">
    
    <!-- Inline splash screen styles - renders immediately -->
    <style id="kms-splash-styles">
        #kms-splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--sapBackgroundColor, #fafafa);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease-out;
        }

        /* Fiori-style busy indicator: three animated dots */
        #kms-splash-screen .splash-busy {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
        }

        #kms-splash-screen .splash-busy-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--sapContent_IconColor, #0070f2);
            animation: splash-dot-pulse 1.4s ease-in-out infinite;
        }

        #kms-splash-screen .splash-busy-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        #kms-splash-screen .splash-busy-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes splash-dot-pulse {
            0%, 80%, 100% {
                transform: scale(0.4);
                opacity: 0.3;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        #kms-splash-screen .splash-title {
            display: none;
            margin-top: 1.5rem;
            font-family: "72", "72full", Arial, Helvetica, sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--sapTextColor, #1d2d3e);
            letter-spacing: normal;
        }

        #kms-splash-screen .splash-description {
            display: none;
            margin-top: 0.5rem;
            font-family: "72", "72full", Arial, Helvetica, sans-serif;
            font-size: 0.875rem;
            font-weight: 400;
            color: var(--sapContent_LabelColor, #556b82);
        }

        /* Error state */
        #kms-splash-screen.splash-error .splash-busy {
            display: none;
        }

        #kms-splash-screen.splash-error .splash-error-icon {
            display: block;
        }

        #kms-splash-screen.splash-error .splash-title {
            display: block;
        }

        #kms-splash-screen.splash-error .splash-description {
            display: block;
            color: var(--sapNegativeTextColor, #aa0808);
        }

        #kms-splash-screen .splash-error-icon {
            display: none;
            width: 3rem;
            height: 3rem;
            color: var(--sapNegativeColor, #aa0808);
        }

        #kms-splash-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* Hide main container until ready */
        #container[data-loading="true"] {
            visibility: hidden;
            height: 0;
            overflow: hidden;
        }
    </style>
    
    <script id="kms-splash-helpers">window.KmsSplash={showError:function(t,d){var e=document.getElementById("kms-splash-screen");if(!e)return;e.classList.add("splash-error");var ti=e.querySelector(".splash-title");var de=e.querySelector(".splash-description");if(ti)ti.textContent=t||"Error";if(de)de.textContent=d||""},hide:function(){var e=document.getElementById("kms-splash-screen");if(!e)return;e.classList.add("fade-out");var c=document.getElementById("container");if(c)c.removeAttribute("data-loading");setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e)},300)},show:function(){var e=document.getElementById("kms-splash-screen");if(e){e.classList.remove("fade-out","splash-error");e.style.display=""}}};</script>

    <script id="sap-ui-bootstrap" src="../../../../../../resources/sap-ui-core.js" data-sap-ui-theme="sap_horizon"
        data-sap-ui-resourceroots='{
            "kms": "./"
        }' data-sap-ui-oninit="module:sap/ui/core/ComponentSupport" data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true" data-sap-ui-appCacheBuster="./">
    </script>

</head>

<body class="sapUiBody">
    <div id="kms-splash-screen" role="status" aria-live="polite" aria-label="Application loading">
        <div class="splash-busy" aria-hidden="true">
            <span class="splash-busy-dot"></span>
            <span class="splash-busy-dot"></span>
            <span class="splash-busy-dot"></span>
        </div>
        <svg class="splash-error-icon" aria-hidden="true" viewBox="0 0 512 512" fill="currentColor">
            <path d="M256 48C141.31 48 48 141.31 48 256s93.31 208 208 208 208-93.31 208-208S370.69 48 256 48zm0 319.91a20 20 0 1 1 20-20 20 20 0 0 1-20 20zm21.72-201.15-5.74 122a16 16 0 0 1-32 0l-5.74-122a21.73 21.73 0 0 1 21.5-22.69h.21a21.74 21.74 0 0 1 21.73 22.7z"/>
        </svg>
        <div class="splash-title"></div>
        <div class="splash-description"></div>
    </div>
    
    <div data-sap-ui-component data-name="kms" data-id="container" data-settings='{"id" : "kms"}' data-loading="true"></div>
</body>

</html>
